<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Orbit</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="mobile-controls.css" />
  <link rel="stylesheet" href="title-screen.css" />
</head>
<body class="title-screen-active">
  <canvas id="game" aria-label="Orbit game canvas"></canvas>

  <header class="hud-header">
    <div class="hud-left">
      <div class="control-panel" aria-label="Game controls">
        <button id="pause" class="control-button pause-button" type="button" aria-label="Pause game" disabled>⏸</button>
        <button id="reset" class="control-button reset-button" type="button" aria-label="Reset run" disabled>↻</button>
        <button id="sound" class="control-button sound-button" type="button" aria-label="Mute sound effects">🔊</button>
      </div>
    </div>
    <div class="title">ORBIT</div>
    <div class="hud-right">
      <div class="stats">
        <span>Score <strong id="score">0</strong></span>
        <span>Lives <strong id="lives">3</strong></span>
        <span>Run <strong id="level">1</strong></span>
      </div>
    </div>
  </header>

  <div class="instruction" id="instruction">
    <strong>TRAINING ORBIT</strong>
    <span>Tap planet to move outward.</span>
    <span>Tap rings to move inward.</span>
    <span>Dodge pink debris.</span>
    <span>Reach the outer orbit.</span>
  </div>

  <div class="mobile-controls" id="mobileControls" aria-label="Mobile movement controls" aria-hidden="true">
    <button id="mobile-in" class="mobile-move-button mobile-in-button" type="button" aria-label="Move inward" disabled>IN</button>
    <button id="mobile-out" class="mobile-move-button mobile-out-button" type="button" aria-label="Move outward" disabled>OUT</button>
  </div>

  <div id="message" class="message"></div>

  <script src="game.js"></script>
  <script src="balance.js"></script>
  <script src="planet.js"></script>
  <script src="screens.js"></script>
  <script src="orbit-events.js"></script>
  <script src="audio.js"></script>
  <script src="mobile-controls.js"></script>
  <script src="title-screen.js"></script>
</body>
</html>
