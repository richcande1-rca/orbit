<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Orbit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game" aria-label="Orbit game canvas"></canvas>

  <header class="hud-header">
    <div class="hud-left">
      <div class="control-panel" aria-label="Game controls">
        <button id="pause" class="control-button pause-button" type="button" aria-label="Pause game" disabled>⏸</button>
        <button id="reset" class="control-button reset-button" type="button" aria-label="Reset run" disabled>↻</button>
      </div>
    </div>
    <div class="title">ORBIT</div>
    <div class="hud-right">
      <div class="stats">
        <span>Score <strong id="score">0</strong></span>
        <span>Lives <strong id="lives">3</strong></span>
        <span>Run <strong id="level">1</strong></span>
      </div>
    </div>
  </header>

  <div class="instruction" id="instruction">Tap planet.</div>

  <div id="message" class="message"></div>

  <script src="game.js"></script>
  <script src="planet.js"></script>
</body>
</html>
